<!DOCTYPE html>
<html>
<head>
    <title>Preview - {{ deck.name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #1a1a2e;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 40px 16px;
        }
        .container {
            max-width: 600px;
            width: 100%;
        }
        .question-card {
            background-color: #16213e;
            border: none;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        .answer {
            color: #aaaaaa;
            margin-top: 8px;
            font-size: 0.95rem;
        }
        .btn-add {
            background-color: #e94560;
            border: none;
            border-radius: 10px;
            padding: 10px 24px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            margin-top: 8px;
        }
        .btn-add:hover { background-color: #c73652; color: white; }
        .btn-back {
            color: #aaaaaa;
            text-decoration: none;
            display: inline-block;
            margin-top: 16px;
            margin-left: 16px;
        }
        .btn-back:hover { color: #ffffff; }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="mb-2">{{ deck.name }}</h1>
        <p style="color: #aaaaaa;" class="mb-4">Sample questions from this deck:</p>
        {% for question in questions %}
            <div class="question-card">
                <p><strong>{{ question.text }}</strong></p>
                <p class="answer">Answer: {{ question.answer }}</p>
            </div>
        {% endfor %}
        <a href="/library/add/{{ deck.id }}" class="btn-add">+ Add to My Decks</a>
        <a href="/library" class="btn-back">← Back to Library</a>
    </div>
</body>
</html>
