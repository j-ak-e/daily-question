<!DOCTYPE html>
<html>
<head>
    <title>Sign Up</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #1a1a2e;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background-color: #16213e;
            border: none;
            border-radius: 16px;
            padding: 40px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        input {
            background-color: #0f3460;
            border: none;
            border-radius: 10px;
            padding: 12px;
            color: #ffffff;
            width: 100%;
            margin-bottom: 16px;
        }
        input::placeholder { color: #aaaaaa; }
        .btn-main {
            background-color: #e94560;
            border: none;
            border-radius: 10px;
            padding: 10px 24px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }
        .btn-main:hover { background-color: #c73652; }
        .error {
            background-color: #e94560;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 16px;
        }
        a { color: #aaaaaa; }
        a:hover { color: #ffffff; }
    </style>
</head>
<body>
    <div class="card">
        <h1 class="mb-4">Sign Up</h1>
        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}
        <form method="POST">
            <input type="text" name="username" placeholder="Username" required />
            <input type="email" name="email" placeholder="Email" required />
            <input type="password" name="password" placeholder="Password" required />
            <button type="submit" class="btn-main">Create Account</button>
        </form>
        <p class="mt-3 text-center">Already have an account? <a href="/login">Log in</a></p>
    </div>
</body>
</html>
